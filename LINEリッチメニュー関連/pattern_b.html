<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 2500px; height: 843px; overflow: hidden; }
.container {
  width: 2500px;
  height: 843px;
  display: flex;
  background: #0f172a;
  font-family: 'Segoe UI', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
}
.cell {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  margin: 20px 10px;
  border-radius: 24px;
}
.cell:first-child { margin-left: 20px; }
.cell:last-child { margin-right: 20px; }
.cell.main {
  background: linear-gradient(180deg, #22c55e 0%, #16a34a 100%);
  box-shadow: 0 0 40px rgba(34,197,94,0.4);
}
.cell.secondary {
  background: rgba(255,255,255,0.08);
  border: 2px solid rgba(255,255,255,0.12);
}
.icon-circle {
  width: 130px;
  height: 130px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 28px;
  font-size: 64px;
}
.cell.main .icon-circle {
  background: rgba(255,255,255,0.2);
}
.cell.secondary .icon-circle {
  background: rgba(255,255,255,0.1);
}
.title {
  color: #fff;
  font-size: 54px;
  font-weight: 800;
  letter-spacing: 3px;
  margin-bottom: 14px;
}
.subtitle {
  color: rgba(255,255,255,0.7);
  font-size: 28px;
  font-weight: 400;
}
.cell.main .subtitle { color: rgba(255,255,255,0.9); }
.arrow {
  position: absolute;
  bottom: 28px;
  font-size: 36px;
  color: rgba(255,255,255,0.5);
}
.cell.main .arrow { color: rgba(255,255,255,0.8); }
.pulse-dot {
  position: absolute;
  top: 28px;
  right: 28px;
  width: 20px;
  height: 20px;
  background: #fbbf24;
  border-radius: 50%;
  box-shadow: 0 0 12px rgba(251,191,36,0.6);
}
</style>
</head>
<body>
<div class="container">
  <div class="cell main">
    <div class="pulse-dot"></div>
    <div class="icon-circle">🏌️</div>
    <div class="title">スイング解析</div>
    <div class="subtitle">動画を送ってAI診断</div>
    <div class="arrow">▼</div>
  </div>
  <div class="cell secondary">
    <div class="icon-circle">📖</div>
    <div class="title">使い方</div>
    <div class="subtitle">はじめての方へ</div>
    <div class="arrow">▼</div>
  </div>
  <div class="cell secondary">
    <div class="icon-circle">💬</div>
    <div class="title">問い合わせ</div>
    <div class="subtitle">お気軽にどうぞ</div>
    <div class="arrow">▼</div>
  </div>
</div>
</body>
</html>
